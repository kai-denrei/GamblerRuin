// ── Dice math ────────────────────────────────────────────────────────────────
const COMBOS = { 2:1, 3:2, 4:3, 5:4, 6:5, 7:6, 8:5, 9:4, 10:3, 11:2, 12:1 };
const THEORETICAL = {};
for (let s = 2; s <= 12; s++) THEORETICAL[s] = COMBOS[s] / 36;

const FRACTIONS = { 2:"1/36", 3:"2/36", 4:"3/36", 5:"4/36", 6:"5/36", 7:"6/36", 8:"5/36", 9:"4/36", 10:"3/36", 11:"2/36", 12:"1/36" };

function rollDice() { return Math.ceil(Math.random() * 6) + Math.ceil(Math.random() * 6); }

function sumColor(s) {
  if (s === 7) return C.amber;
  if (s === 6 || s === 8) return C.blue;
  if (s === 2 || s === 12) return C.red;
  return C.muted;
}

// ── Unicode dice faces ───────────────────────────────────────────────────────
const DICE_FACE = { 1: "\u2680", 2: "\u2681", 3: "\u2682", 4: "\u2683", 5: "\u2684", 6: "\u2685" };

// All dice pairs grouped by sum
function dicePairsForSum(s) {
  const pairs = [];
  for (let a = 1; a <= 6; a++) {
    const b = s - a;
    if (b >= 1 && b <= 6) pairs.push([a, b]);
  }
  return pairs;
}

// ── Sample space grid — dice combos by sum ──────────────────────────────────
function DiceGrid({ label, impossibleLabel }) {
  const impLabel = impossibleLabel || "impossible with 2 dice";
  return (
    <div style={{ marginTop: 16, marginBottom: 8 }}>
      <div style={{ fontSize: S.sm, color: C.muted, letterSpacing: "0.08em", marginBottom: 10 }}>
        {label}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
        {/* 1 = impossible */}
        <div style={{
          padding: "10px 14px", borderRadius: 4,
          background: `${C.muted}08`, border: `1px dashed ${C.muted}30`,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
            <span style={{ fontSize: S.md, fontWeight: 700, color: C.muted, fontFamily: F.mono }}>1</span>
            <span style={{ fontSize: S.xs, color: C.muted, fontFamily: F.mono }}>0/36 = 0%</span>
          </div>
          <div style={{ fontSize: S.sm, color: C.muted, fontStyle: "italic" }}>
            {impLabel}
          </div>
        </div>
        {/* 2-12 */}
        {Array.from({ length: 11 }, (_, i) => {
          const s = i + 2;
          const pairs = dicePairsForSum(s);
          const color = sumColor(s);
          return (
            <div key={s} style={{
              padding: "10px 14px", borderRadius: 4,
              background: `${color}08`, border: `1px solid ${color}20`,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                <span style={{ fontSize: S.md, fontWeight: 700, color, fontFamily: F.mono }}>{s}</span>
                <span style={{ fontSize: S.xs, color: C.muted, fontFamily: F.mono }}>{FRACTIONS[s]} = {(THEORETICAL[s] * 100).toFixed(1)}%</span>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {pairs.map(([a, b], j) => (
                  <span key={j} style={{
                    fontSize: 28, letterSpacing: 2, color,
                    lineHeight: 1,
                  }} title={`${a} + ${b} = ${s}`}>
                    {DICE_FACE[a]}{DICE_FACE[b]}
                  </span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  independent: "Dice have no memory. Prior rolls cannot affect the next. Each roll is a fresh experiment.",
  hypergeometric: "Drawing without replacement: P(type X) = (X remaining) / (total remaining). Not binomial — each draw changes the deck.",

  largestArmy: "Requires 3+ Knights played. Once Knights are gone from the deck, no new challenger can take it.",
  chi2: "Measures observed vs. expected frequency fit. Lower = better. Below 18.3 (at p=0.05, 10 d.f.) = no significant deviation.",
  robber: "Roll 7: robber activates. Players with 7+ cards discard half. Roller moves robber, steals one card.",
};

function InfoTip({ term, children }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const desc = TIPS[term];
  if (!desc) return children;
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('pointerdown', handler);
    return () => document.removeEventListener('pointerdown', handler);
  }, [open]);
  return (
    <span ref={ref} style={{ position: "relative", display: "inline" }}>
      <span
        onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}
        onTouchStart={(e) => { e.preventDefault(); setOpen(o => !o); }}
        style={{ borderBottom: `1px dotted ${C.muted}`, cursor: "help" }}
      >{children}</span>
      {open && (
        <span style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%",
          transform: "translateX(-50%)", width: 280, padding: "10px 12px",
          background: "#1a2540", border: `1px solid ${C.border}`,
          borderRadius: 6, fontSize: S.base, lineHeight: 1.6,
          color: C.text, zIndex: 1000, pointerEvents: "auto",
          fontFamily: F.serif, fontWeight: 300,
          boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
        }}>
          {desc}
          <span style={{
            position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)",
            width: 0, height: 0,
            borderLeft: "6px solid transparent", borderRight: "6px solid transparent",
            borderTop: "6px solid #1a2540",
          }} />
        </span>
      )}
    </span>
  );
}

const CARD_COLORS = { Knight: C.knight, "Victory Point": C.vp, "Road Building": C.road, "Year of Plenty": C.plenty, Monopoly: C.monopoly };

// ── Chi-squared ──────────────────────────────────────────────────────────────
function chi2(counts, n) {
  let stat = 0;
  for (let s = 2; s <= 12; s++) {
    const expected = THEORETICAL[s] * n;
    const observed = counts[s] || 0;
    if (expected > 0) stat += Math.pow(observed - expected, 2) / expected;
  }
  return stat;
}

// ── Histogram tooltip ────────────────────────────────────────────────────────
function HistTooltip({ active, payload, t }) {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  const s = d.sum;
  const pairs = dicePairsForSum(s);
  const color = sumColor(s);
  const tt = t || ((k) => ({ ttSum: "Sum", ttTheory: "Theory", ttObserved: "Observed", ttRolls: "rolls" }[k]) || k);
  return (
    <div style={{
      background: C.panel, border: `1px solid ${C.border}`,
      padding: "10px 14px", fontFamily: F.mono, fontSize: S.base,
    }}>
      <div style={{ color: C.bright, fontWeight: "bold", marginBottom: 6 }}>{tt("ttSum")}: {s}</div>
      {d.theoretical != null && <div style={{ color: C.amber }}>{tt("ttTheory")}: {(d.theoretical < 1 ? (d.theoretical * 100).toFixed(2) : d.theoretical.toFixed(2))}% ({FRACTIONS[s]})</div>}
      {d.observed != null && <div style={{ color: C.blue }}>{tt("ttObserved")}: {d.observed} {tt("ttRolls")} ({d.obsPct}%)</div>}
      <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 4 }}>
        {pairs.map(([a, b], j) => (
          <div key={j} style={{ fontSize: 24, color, lineHeight: 1, letterSpacing: 2 }}>
            {DICE_FACE[a]}{DICE_FACE[b]}
          </div>
        ))}
      </div>
      <div style={{ fontSize: S.xs, color: C.muted, marginTop: 4 }}>
        {pairs.length} combination{pairs.length > 1 ? "s" : ""}
      </div>
    </div>
  );
}

// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // Language
  const [lang, setLang] = useState("en");
  const t = (key) => LANG[lang]?.[key] ?? LANG.en[key] ?? key;
  const ja = lang === "ja";

  // Section 3: 70-roll simulation
  const [rolls, setRolls] = useState([]);
  const [rolling, setRolling] = useState(false);
  const rollRef = useRef(null);

  // Section 4: convergence slider
  const [convN, setConvN] = useState(70);
  const [convCounts, setConvCounts] = useState(null);

  // Section 5: gambler's fallacy
  const [streak, setStreak] = useState([]);

  // Section 6: dev cards
  const [deck, setDeck] = useState({ ...DECK_INIT });

  // Section 7: proof accordion
  const [proofsOpen, setProofsOpen] = useState(false);

  // Section 8: card counter
  const ZERO_CARDS = { Knight: 0, "Victory Point": 0, "Road Building": 0, "Year of Plenty": 0, Monopoly: 0 };
  const [revealed, setRevealed] = useState({ ...ZERO_CARDS });
  const [held, setHeld] = useState({ ...ZERO_CARDS });
  const incRevealed = (type) => setRevealed(r => {
    const used = r[type] + held[type];
    if (used >= DECK_INIT[type]) return r;
    return { ...r, [type]: r[type] + 1 };
  });
  const decRevealed = (type) => setRevealed(r => ({ ...r, [type]: Math.max(0, r[type] - 1) }));
  const incHeld = (type) => setHeld(h => {
    const used = revealed[type] + h[type];
    if (used >= DECK_INIT[type]) return h;
    return { ...h, [type]: h[type] + 1 };
  });
  const decHeld = (type) => setHeld(h => ({ ...h, [type]: Math.max(0, h[type] - 1) }));
  const resetCounter = () => { setRevealed({ ...ZERO_CARDS }); setHeld({ ...ZERO_CARDS }); };
  const totalRevealed = Object.values(revealed).reduce((a, b) => a + b, 0);
  const totalHeld = Object.values(held).reduce((a, b) => a + b, 0);
  const deckRemaining = 25 - totalRevealed - totalHeld;
  const deckComposition = {};
  for (const type of Object.keys(DECK_INIT)) {
    deckComposition[type] = DECK_INIT[type] - revealed[type] - held[type];
  }

  // ── Section 3: animate 70 rolls ──────────────────────────────────────────
  const runSim = useCallback(() => {
    if (rollRef.current) clearInterval(rollRef.current);
    setRolls([]);
    setRolling(true);
    let count = 0;
    const allRolls = [];
    rollRef.current = setInterval(() => {
      allRolls.push(rollDice());
      count++;
      setRolls([...allRolls]);
      if (count >= 70) {
        clearInterval(rollRef.current);
        rollRef.current = null;
        setRolling(false);
      }
    }, 25);
  }, []);

  useEffect(() => () => { if (rollRef.current) clearInterval(rollRef.current); }, []);

  const rollCounts = useMemo(() => {
    const c = {};
    for (let s = 2; s <= 12; s++) c[s] = 0;
    rolls.forEach(r => c[r]++);
    return c;
  }, [rolls]);

  const rollData = useMemo(() => {
    const n = rolls.length || 1;
    return Array.from({ length: 11 }, (_, i) => {
      const sum = i + 2;
      return {
        sum, theoretical: THEORETICAL[sum],
        observed: rollCounts[sum] || 0,
        obsPct: ((rollCounts[sum] || 0) / n * 100).toFixed(1),
        obsFrac: (rollCounts[sum] || 0) / n,
      };
    });
  }, [rollCounts, rolls.length]);

  // ── Section 4: convergence ────────────────────────────────────────────────
  useEffect(() => {
    const c = {};
    for (let s = 2; s <= 12; s++) c[s] = 0;
    for (let i = 0; i < convN; i++) c[rollDice()]++;
    setConvCounts(c);
  }, [convN]);

  const convData = useMemo(() => {
    if (!convCounts) return [];
    return Array.from({ length: 11 }, (_, i) => {
      const sum = i + 2;
      return {
        sum,
        theoretical: THEORETICAL[sum] * 100,
        observed: (convCounts[sum] || 0) / convN * 100,
      };
    });
  }, [convCounts, convN]);

  const convChi2 = convCounts ? chi2(convCounts, convN) : 0;

  // ── Section 5: streak ─────────────────────────────────────────────────────
  const addRoll = useCallback(() => setStreak(s => [...s, rollDice()]), []);
  const addNon7 = useCallback(() => {
    let r;
    do { r = rollDice(); } while (r === 7);
    setStreak(s => [...s, r]);
  }, []);

  // ── Section 6: deck ──────────────────────────────────────────────────────
  const deckTotal = Object.values(deck).reduce((a, b) => a + b, 0);
  const drawCard = useCallback((type) => {
    setDeck(d => {
      if (d[type] <= 0) return d;
      return { ...d, [type]: d[type] - 1 };
    });
  }, []);
  const resetDeck = useCallback(() => setDeck({ ...DECK_INIT }), []);

            }}>
              <div style={{ fontSize: S.sm, color: C.green, letterSpacing: "0.1em", marginBottom: 8 }}>{t("s5reality")}</div>
              <div style={{ fontFamily: ja ? F.body : F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.6, marginBottom: 8 }}>
                <InfoTip term="independent">{t("s5independent")}</InfoTip>{t("s5noMemory")}
              </div>
              <div style={{ fontFamily: F.mono, fontSize: S.lg, color: C.green, fontWeight: 700 }}>
                {t("s5always")}
              </div>
            </div>
          </div>
        </div>

        {/* ══ Section 6: Development Cards ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500 }}>{t("s6title")}</div>
              <div style={{ fontSize: S.sm, color: C.muted }}>
                <InfoTip term="hypergeometric">{t("s6sub")}</InfoTip> &mdash; {deckTotal}{t("s6cards")}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: S.base, fontFamily: F.mono, color: C.muted }}>
                {deckTotal} / 25 {t("s6remaining")}
              </span>
              <button onClick={resetDeck} style={{
                padding: "10px 18px", background: "transparent",
                border: `1px solid ${C.border}`, color: C.muted,
                fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
              }}>{t("s6resetDeck")}</button>
            </div>
          </div>

          {/* Stacked bar */}
          <div style={{
            display: "flex", height: 24, borderRadius: 3, overflow: "hidden",
            marginBottom: 16, marginTop: 12,
          }}>
            {Object.entries(deck).map(([type, count]) => {
              const pct = deckTotal > 0 ? (count / deckTotal * 100) : 0;
              if (pct <= 0) return null;
              return (
                <div key={type} style={{
                  width: `${pct}%`, background: `${CARD_COLORS[type]}80`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: S.xs, color: C.bright, letterSpacing: "0.05em",
                  transition: "width 0.3s",
                  overflow: "hidden", whiteSpace: "nowrap",
                }}>
                  {pct > 12 ? type : ""}
                </div>
              );
            })}
          </div>

          {/* Card panels */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 10, marginBottom: 16 }}>
            {Object.entries(deck).map(([type, count]) => {
              const pct = deckTotal > 0 ? (count / deckTotal * 100) : 0;
              const color = CARD_COLORS[type];
              const isVP = type === "Victory Point";
              const shortName = CARD_SHORT[type] || type.toUpperCase();
              return (
                <div key={type} style={{
                  background: `${color}08`, border: `1px solid ${color}25`,
                  borderRadius: 4, padding: "12px 14px",
                }}>
                  <div style={{ fontSize: S.sm, color, letterSpacing: "0.08em", marginBottom: 4 }}>
                    {isVP ? <InfoTip term="vp">{shortName}</InfoTip> : shortName}
                  </div>
                  <div style={{ fontFamily: F.mono, fontSize: S.xl, fontWeight: 700, color, marginBottom: 4 }}>
                    {pct.toFixed(1)}%
                  </div>
                  <div style={{ fontSize: S.sm, color: C.muted, fontFamily: F.mono, marginBottom: 8 }}>
                    {count} / {deckTotal} cards
                  </div>
                  <button onClick={() => drawCard(type)} disabled={count <= 0} style={{
                    padding: "8px 14px", background: "transparent",
                    border: `1px solid ${count > 0 ? color : C.border}`,
                    color: count > 0 ? color : C.muted,
                    fontSize: S.xs, letterSpacing: "0.06em", borderRadius: 2,
                    opacity: count <= 0 ? 0.4 : 1, width: "100%",
                  }}>
                    {t("s6draw")}
                  </button>
                </div>
              );
            })}
          </div>

          {/* Knight warning */}
          {knightsLeft <= 3 && knightsLeft > 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 4,
              background: `${C.red}08`, border: `1px solid ${C.red}25`,
              fontSize: S.base, color: C.red, fontFamily: F.mono,
            }}>
              <InfoTip term="largestArmy">{t("s6knightWarning")}</InfoTip> {t("s6knightContested").replace("{n}", knightsLeft)}
            </div>
          )}
          {knightsLeft === 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 4,
              background: `${C.red}08`, border: `1px solid ${C.red}25`,
              fontSize: S.base, color: C.red, fontFamily: F.mono,
            }}>
              {t("s6knightLocked").replace("{la}", "").replace("  ", " ")}<InfoTip term="largestArmy">{t("s6knightWarning")}</InfoTip>
            </div>
          )}

          {/* Insight callout */}
          <div style={{
            marginTop: 14, padding: "12px 16px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.7,
          }}>
            {t("s6insight")}<span style={{ color: C.knight, fontFamily: F.mono }}>{t("s6insightKnight")}</span>、<span style={{ color: C.monopoly, fontFamily: F.mono }}>{t("s6insightMonopoly")}</span>{t("s6insightEnd")}
          </div>
        </div>

        {/* ══ Section 7: Proof Steps ══ */}
        <div style={{
          border: `1px solid ${C.border}`, borderRadius: 4,
          marginBottom: 24, overflow: "hidden",
        }}>
          <button
            onClick={() => setProofsOpen(o => !o)}
            style={{
              width: "100%", padding: "10px 16px", background: C.panel,
              border: "none", display: "flex", justifyContent: "space-between",
              alignItems: "center", color: C.text,
            }}
          >
            <span style={{ fontSize: S.sm, letterSpacing: "0.12em", color: C.amber }}>
              {t("s7title")}
            </span>
            <span style={{ fontSize: S.sm, color: C.muted }}>{proofsOpen ? t("s7collapse") : t("s7expand")}</span>
          </button>
          {proofsOpen && (
            <div style={{ padding: "16px 20px" }}>
              {[
                { id: t("s7step1"), claim: t("s7claim1"), source: "Feller, Vol. I, Ch. I (1950)." },
                { id: t("s7step2"), claim: t("s7claim2"), source: "Ibid., Ch. X." },
                { id: t("s7step3"), claim: t("s7claim3"), source: "Ibid., Ch. V." },
                { id: t("s7step4"), claim: t("s7claim4"), source: "Ibid., Ch. II." },
              ].map(({ id, claim, source }) => (
                <div key={id} style={{
                  marginBottom: 16, paddingLeft: 14,
                  borderLeft: `2px solid ${C.subtle}`,
                }}>
                  <div style={{
                    fontSize: S.sm, letterSpacing: "0.1em", color: C.amber,
                    fontFamily: F.mono, marginBottom: 6,
                  }}>{id}</div>
                  <div style={{
                    fontFamily: F.serif,
                    fontSize: S.md, lineHeight: 1.75, color: "#94a3b8",
                  }}>{claim}</div>
                  <div style={{
                    fontSize: S.base, color: C.muted, marginTop: 6,
                    fontFamily: F.serif, fontStyle: "italic",
                  }}>&#8627; {source}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ══ Section 8: Card Counter ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500 }}>{t("s8title2")}</div>
              <div style={{ fontSize: S.sm, color: C.muted }}>{t("s8sub")}</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: S.base, fontFamily: F.mono, color: C.muted }}>
                {deckRemaining} / 25 {t("s8remaining")}
              </span>
              <button onClick={resetCounter} style={{
                padding: "10px 18px", background: "transparent",
                border: `1px solid ${C.border}`, color: C.muted,
                fontSize: S.sm, borderRadius: 2,
              }}>{t("s8reset2")}</button>
            </div>
          </div>

          {/* Revealed + Held counters */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: S.sm, fontFamily: F.mono }}>
              <thead>
                <tr>
                  <th style={{ padding: "6px 8px", textAlign: "left", color: C.muted, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}></th>
                  <th style={{ padding: "6px 8px", textAlign: "center", color: C.muted, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}>Total</th>
                  <th style={{ padding: "6px 8px", textAlign: "center", color: C.amber, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}>{t("s8revealed")}</th>
                  <th style={{ padding: "6px 8px", textAlign: "center", color: C.blue, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}>{t("s8yourHand")}</th>
                  <th style={{ padding: "6px 8px", textAlign: "center", color: C.muted, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}>In Deck</th>
                  <th style={{ padding: "6px 8px", textAlign: "center", color: C.green, borderBottom: `1px solid ${C.border}`, fontWeight: 400 }}>{t("s8odds")}</th>
                </tr>
              </thead>
              <tbody>
                {Object.keys(DECK_INIT).map(type => {
                  const color = CARD_COLORS[type];
                  const inDeck = deckComposition[type];
                  const odds = deckRemaining > 0 ? (inDeck / deckRemaining * 100) : 0;
                  const shortName = CARD_SHORT[type] || type;
                  return (
                    <tr key={type} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td style={{ padding: "8px 8px", color, fontWeight: 500 }}>{shortName}</td>
                      <td style={{ padding: "8px 8px", textAlign: "center", color: C.muted }}>{DECK_INIT[type]}</td>
                      <td style={{ padding: "8px 8px", textAlign: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                          <button onClick={() => decRevealed(type)} style={{
                            width: 28, height: 28, border: `1px solid ${C.border}`, background: "transparent",
                            color: C.muted, fontSize: S.base, borderRadius: 3, minHeight: "auto",
                            display: "flex", alignItems: "center", justifyContent: "center",
                          }}>&minus;</button>
                          <span style={{ color: C.amber, minWidth: 20, textAlign: "center" }}>{revealed[type]}</span>
                          <button onClick={() => incRevealed(type)} style={{
                            width: 28, height: 28, border: `1px solid ${color}`, background: "transparent",
                            color, fontSize: S.base, borderRadius: 3, minHeight: "auto",
                            display: "flex", alignItems: "center", justifyContent: "center",
                          }}>+</button>
                        </div>
                      </td>
                      <td style={{ padding: "8px 8px", textAlign: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                          <button onClick={() => decHeld(type)} style={{
                            width: 28, height: 28, border: `1px solid ${C.border}`, background: "transparent",
                            color: C.muted, fontSize: S.base, borderRadius: 3, minHeight: "auto",
                            display: "flex", alignItems: "center", justifyContent: "center",
                          }}>&minus;</button>
                          <span style={{ color: C.blue, minWidth: 20, textAlign: "center" }}>{held[type]}</span>
                          <button onClick={() => incHeld(type)} style={{
                            width: 28, height: 28, border: `1px solid ${color}`, background: "transparent",
                            color, fontSize: S.base, borderRadius: 3, minHeight: "auto",
                            display: "flex", alignItems: "center", justifyContent: "center",
                          }}>+</button>
                        </div>
                      </td>
                      <td style={{ padding: "8px 8px", textAlign: "center", color: inDeck > 0 ? C.text : C.muted }}>{inDeck}</td>
                      <td style={{ padding: "8px 8px", textAlign: "center", color: C.green, fontWeight: 700 }}>
                        {deckRemaining > 0 ? `${odds.toFixed(1)}%` : "\u2014"}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Stacked remaining bar */}
          {deckRemaining > 0 && (
            <div style={{
              display: "flex", height: 20, borderRadius: 3, overflow: "hidden",
              marginTop: 14,
            }}>
              {Object.keys(DECK_INIT).map(type => {
                const inDeck = deckComposition[type];
                const pct = inDeck / deckRemaining * 100;
                if (pct <= 0) return null;
                return (
                  <div key={type} style={{
                    width: `${pct}%`, background: `${CARD_COLORS[type]}80`,
                    transition: "width 0.3s",
                  }} />
                );
              })}
            </div>
          )}

          {/* Reveal note */}
          <div style={{
            marginTop: 14, padding: "12px 16px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            fontFamily: ja ? F.body : F.serif, fontSize: S.base, color: "#94a3b8", lineHeight: 1.7,
          }}>
            {t("s8revealNote")}
          </div>

          {/* Why unrevealed don't matter */}
          <div style={{
            marginTop: 10, padding: "12px 16px", borderRadius: 4,
            background: `${C.blue}08`, border: `1px solid ${C.blue}25`,
          }}>
            <div style={{ fontSize: S.sm, color: C.blue, letterSpacing: "0.08em", marginBottom: 6 }}>
              {t("s8unrevealed")}
            </div>
            <div style={{ fontFamily: ja ? F.body : F.serif, fontSize: S.base, color: "#94a3b8", lineHeight: 1.7 }}>
              {t("s8unrevealedNote")}
            </div>
          </div>
        </div>

        {/* ══ Section 9: Citations ══ */}
        <div style={{
          paddingTop: 16, borderTop: `1px solid ${C.border}`,
          fontSize: S.sm, color: C.muted, lineHeight: 2,
        }}>
          <div style={{ letterSpacing: "0.08em", marginBottom: 4 }}>{t("s9title")}</div>
          <div>[1] Feller, W. (1950). <em>An Introduction to Probability Theory and Its Applications,</em> Vol. I. Wiley.</div>
          <div>[2] Kahneman, D. (2011). <em>Thinking, Fast and Slow.</em> Farrar, Straus and Giroux. Ch. 10: The Law of Small Numbers.</div>
          <div>[3] Catan GmbH. <em>CATAN Official Rulebook,</em> 5th Ed. Deck: 14 Knights, 5 VPs, 2 Road Building, 2 Year of Plenty, 2 Monopoly.</div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
