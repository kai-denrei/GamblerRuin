<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>The Dice Don't Care — Catan Statistics</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap" rel="stylesheet">

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0e18;
    font-size: clamp(16px, 1.1vw + 14px, 18px);
    line-height: 1.5;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0a0e18; }
  ::-webkit-scrollbar-thumb { background: #162035; border-radius: 2px; }
  input[type=range] { accent-color: #f59e0b; cursor: pointer; min-height: 44px; }
  button { cursor: pointer; min-height: 44px; }
  .nav-bar {
    display: flex; gap: 0; border-bottom: 1px solid #162035;

    font-family: 'Inter', -apple-system, sans-serif;
  }
  .nav-bar a {
    padding: 12px 20px; font-size: 13px; letter-spacing: 0.06em;
    text-decoration: none; color: #475569; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;

<body>
<nav class="nav-bar">
  <a href="index.html">GAMBLER'S RUIN</a>
  <a href="catan.html" class="active">CATAN STATISTICS</a>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const { BarChart, Bar, ComposedChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

// ── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg: "#0a0e18", panel: "#0f1525", border: "#1a2540",
  amber: "#f59e0b", green: "#10b981", red: "#ef4444",
  blue: "#60a5fa", text: "#d1d5e0", muted: "#6b7280",
  bright: "#f1f5f9", subtle: "#1e2d47",
  knight: "#60a5fa", vp: "#f59e0b", road: "#10b981",
  plenty: "#a78bfa", monopoly: "#ef4444",
};

// Font families
const F = {
  body: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
  mono: "'JetBrains Mono', monospace",
  serif: "'Source Serif 4', serif",
  display: "'Playfair Display', serif",
};

// Font sizes (consolidated scale — 6 sizes)
const S = {
  xs: 12,    // captions, fine labels
  sm: 13,    // metadata, secondary labels
  base: 15,  // body, UI text
  md: 17,    // lead text, section intros
  lg: 20,    // card titles, H3
  xl: 24,    // H2, hero subtitle
  xxl: 28,   // H1, display
};

// ── Dice math ────────────────────────────────────────────────────────────────
const COMBOS = { 2:1, 3:2, 4:3, 5:4, 6:5, 7:6, 8:5, 9:4, 10:3, 11:2, 12:1 };
const THEORETICAL = {};
for (let s = 2; s <= 12; s++) THEORETICAL[s] = COMBOS[s] / 36;

const FRACTIONS = { 2:"1/36", 3:"2/36", 4:"3/36", 5:"4/36", 6:"5/36", 7:"6/36", 8:"5/36", 9:"4/36", 10:"3/36", 11:"2/36", 12:"1/36" };

function rollDice() { return Math.ceil(Math.random() * 6) + Math.ceil(Math.random() * 6); }

function sumColor(s) {
  if (s === 7) return C.amber;
  if (s === 6 || s === 8) return C.blue;
  if (s === 2 || s === 12) return C.red;
  return C.muted;
}

// ── Unicode dice faces ───────────────────────────────────────────────────────
const DICE_FACE = { 1: "\u2680", 2: "\u2681", 3: "\u2682", 4: "\u2683", 5: "\u2684", 6: "\u2685" };

// All dice pairs grouped by sum
function dicePairsForSum(s) {
  const pairs = [];
  for (let a = 1; a <= 6; a++) {
    const b = s - a;
    if (b >= 1 && b <= 6) pairs.push([a, b]);
  }
  return pairs;
}

// ── Sample space grid — dice combos by sum ──────────────────────────────────
function DiceGrid() {
  return (
    <div style={{ marginTop: 16, marginBottom: 8 }}>
      <div style={{ fontSize: S.sm, color: C.muted, letterSpacing: "0.08em", marginBottom: 10 }}>
        ALL COMBINATIONS BY SUM
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 8 }}>
        {Array.from({ length: 11 }, (_, i) => {
          const s = i + 2;
          const pairs = dicePairsForSum(s);
          const color = sumColor(s);
          return (
            <div key={s} style={{
              padding: "8px 12px", borderRadius: 4,
              background: `${color}08`, border: `1px solid ${color}20`,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                <span style={{ fontSize: S.md, fontWeight: 700, color, fontFamily: "monospace" }}>{s}</span>
                <span style={{ fontSize: S.xs, color: C.muted, fontFamily: "monospace" }}>{FRACTIONS[s]} = {(THEORETICAL[s] * 100).toFixed(1)}%</span>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {pairs.map(([a, b], j) => (
                  <span key={j} style={{
                    fontSize: S.lg, letterSpacing: 1, color,
                    lineHeight: 1,
                  }} title={`${a} + ${b} = ${s}`}>
                    {DICE_FACE[a]}{DICE_FACE[b]}
                  </span>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── InfoTip ──────────────────────────────────────────────────────────────────
const TIPS = {
  combinations: "Two dice, 6 faces each = 36 outcomes. More ways to make a sum = higher probability.",
  independent: "Dice have no memory. Prior rolls cannot affect the next. Each roll is a fresh experiment.",
  hypergeometric: "Drawing without replacement: P(type X) = (X remaining) / (total remaining). Not binomial — each draw changes the deck.",
  gambler: "The false belief that past outcomes affect future ones. Monte Carlo Casino, 1913: black hit 26 times in a row. Gamblers lost fortunes betting red.",
  vp: "VP cards stay hidden until the holder wins. You cannot track them by observation.",
  largestArmy: "Requires 3+ Knights played. Once Knights are gone from the deck, no new challenger can take it.",
  chi2: "Measures observed vs. expected frequency fit. Lower = better. Below 18.3 (at p=0.05, 10 d.f.) = no significant deviation.",
  robber: "Roll 7: robber activates. Players with 7+ cards discard half. Roller moves robber, steals one card.",
};

function InfoTip({ term, children }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const desc = TIPS[term];
  if (!desc) return children;
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('pointerdown', handler);
    return () => document.removeEventListener('pointerdown', handler);
  }, [open]);
  return (
    <span ref={ref} style={{ position: "relative", display: "inline" }}>
      <span
        onMouseEnter={() => setOpen(true)} onMouseLeave={() => setOpen(false)}
        onTouchStart={(e) => { e.preventDefault(); setOpen(o => !o); }}
        style={{ borderBottom: `1px dotted ${C.muted}`, cursor: "help" }}
      >{children}</span>
      {open && (
        <span style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%",
          transform: "translateX(-50%)", width: 280, padding: "10px 12px",
          background: "#1a2540", border: `1px solid ${C.border}`,
          borderRadius: 6, fontSize: S.base, lineHeight: 1.6,
          color: C.text, zIndex: 1000, pointerEvents: "auto",
          fontFamily: F.serif, fontWeight: 300,
          boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
        }}>
          {desc}
          <span style={{
            position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)",
            width: 0, height: 0,
            borderLeft: "6px solid transparent", borderRight: "6px solid transparent",
            borderTop: "6px solid #1a2540",
          }} />
        </span>
      )}
    </span>
  );
}

// ── Dev card constants ───────────────────────────────────────────────────────
const DECK_INIT = { Knight: 14, "Victory Point": 5, "Road Building": 2, "Year of Plenty": 2, Monopoly: 2 };
const CARD_COLORS = { Knight: C.knight, "Victory Point": C.vp, "Road Building": C.road, "Year of Plenty": C.plenty, Monopoly: C.monopoly };

// ── Chi-squared ──────────────────────────────────────────────────────────────
function chi2(counts, n) {
  let stat = 0;
  for (let s = 2; s <= 12; s++) {
    const expected = THEORETICAL[s] * n;
    const observed = counts[s] || 0;
    if (expected > 0) stat += Math.pow(observed - expected, 2) / expected;
  }
  return stat;
}

// ── Histogram tooltip ────────────────────────────────────────────────────────
function HistTooltip({ active, payload }) {
  if (!active || !payload?.length) return null;
  const d = payload[0]?.payload;
  if (!d) return null;
  const s = d.sum;
  const pairs = dicePairsForSum(s);
  const color = sumColor(s);
  return (
    <div style={{
      background: C.panel, border: `1px solid ${C.border}`,
      padding: "10px 14px", fontFamily: F.mono, fontSize: S.base,
    }}>
      <div style={{ color: C.bright, fontWeight: "bold", marginBottom: 6 }}>Sum: {s}</div>
      {d.theoretical != null && <div style={{ color: C.amber }}>Theory: {(d.theoretical < 1 ? (d.theoretical * 100).toFixed(2) : d.theoretical.toFixed(2))}% ({FRACTIONS[s]})</div>}
      {d.observed != null && <div style={{ color: C.blue }}>Observed: {d.observed} rolls ({d.obsPct}%)</div>}
      <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 4 }}>
        {pairs.map(([a, b], j) => (
          <div key={j} style={{ fontSize: S.lg, color, lineHeight: 1 }}>
            {DICE_FACE[a]}{DICE_FACE[b]}
          </div>
        ))}
      </div>
      <div style={{ fontSize: S.xs, color: C.muted, marginTop: 4 }}>
        {pairs.length} combination{pairs.length > 1 ? "s" : ""}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  // Section 3: 70-roll simulation
  const [rolls, setRolls] = useState([]);
  const [rolling, setRolling] = useState(false);
  const rollRef = useRef(null);

  // Section 4: convergence slider
  const [convN, setConvN] = useState(70);
  const [convCounts, setConvCounts] = useState(null);

  // Section 5: gambler's fallacy
  const [streak, setStreak] = useState([]);

  // Section 6: dev cards
  const [deck, setDeck] = useState({ ...DECK_INIT });

  // Section 7: proof accordion
  const [proofsOpen, setProofsOpen] = useState(false);

  // ── Section 3: animate 70 rolls ──────────────────────────────────────────
  const runSim = useCallback(() => {
    if (rollRef.current) clearInterval(rollRef.current);
    setRolls([]);
    setRolling(true);
    let count = 0;
    const allRolls = [];
    rollRef.current = setInterval(() => {
      allRolls.push(rollDice());
      count++;
      setRolls([...allRolls]);
      if (count >= 70) {
        clearInterval(rollRef.current);
        rollRef.current = null;
        setRolling(false);
      }
    }, 25);
  }, []);

  useEffect(() => () => { if (rollRef.current) clearInterval(rollRef.current); }, []);

  const rollCounts = useMemo(() => {
    const c = {};
    for (let s = 2; s <= 12; s++) c[s] = 0;
    rolls.forEach(r => c[r]++);
    return c;
  }, [rolls]);

  const rollData = useMemo(() => {
    const n = rolls.length || 1;
    return Array.from({ length: 11 }, (_, i) => {
      const sum = i + 2;
      return {
        sum, theoretical: THEORETICAL[sum],
        observed: rollCounts[sum] || 0,
        obsPct: ((rollCounts[sum] || 0) / n * 100).toFixed(1),
        obsFrac: (rollCounts[sum] || 0) / n,
      };
    });
  }, [rollCounts, rolls.length]);

  // ── Section 4: convergence ────────────────────────────────────────────────
  useEffect(() => {
    const c = {};
    for (let s = 2; s <= 12; s++) c[s] = 0;
    for (let i = 0; i < convN; i++) c[rollDice()]++;
    setConvCounts(c);
  }, [convN]);

  const convData = useMemo(() => {
    if (!convCounts) return [];
    return Array.from({ length: 11 }, (_, i) => {
      const sum = i + 2;
      return {
        sum,
        theoretical: THEORETICAL[sum] * 100,
        observed: (convCounts[sum] || 0) / convN * 100,
      };
    });
  }, [convCounts, convN]);

  const convChi2 = convCounts ? chi2(convCounts, convN) : 0;

  // ── Section 5: streak ─────────────────────────────────────────────────────
  const addRoll = useCallback(() => setStreak(s => [...s, rollDice()]), []);
  const addNon7 = useCallback(() => {
    let r;
    do { r = rollDice(); } while (r === 7);
    setStreak(s => [...s, r]);
  }, []);

  // ── Section 6: deck ──────────────────────────────────────────────────────
  const deckTotal = Object.values(deck).reduce((a, b) => a + b, 0);
  const drawCard = useCallback((type) => {
    setDeck(d => {
      if (d[type] <= 0) return d;
      return { ...d, [type]: d[type] - 1 };
    });
  }, []);
  const resetDeck = useCallback(() => setDeck({ ...DECK_INIT }), []);
  const knightsLeft = deck.Knight;

  // ── Theoretical data for Section 2 ────────────────────────────────────────
  const theoData = useMemo(() =>
    Array.from({ length: 11 }, (_, i) => {
      const sum = i + 2;
      return { sum, prob: THEORETICAL[sum] * 100, frac: FRACTIONS[sum] };
    }), []);

  // ── Convergence text ──────────────────────────────────────────────────────
  const convText = convN <= 70
    ? "70 rolls = one game. Noisy, irregular. Some sums may not appear at all."
    : convN <= 360
    ? "360 rolls = ~5 games. Bell shape emerging. Peak at 7 visible, edges still rough."
    : convN <= 1000
    ? "1,000 rolls. Recognizably bell-shaped. Deviations shrinking."
    : convN <= 5000
    ? "5,000 rolls. Histogram tracks theory closely."
    : "36,000 rolls. Nearly indistinguishable from theory.";

  return (
    <div style={{
      background: C.bg, minHeight: "100vh", color: C.text,
      fontFamily: F.body, lineHeight: 1.5,
    }}>

      {/* ══ Section 1: Header ══ */}
      <div style={{ borderBottom: `1px solid ${C.border}`, padding: "28px 32px 20px" }}>
        <h1 style={{
          fontFamily: F.display,
          fontSize: S.xxl, fontWeight: 700, color: C.bright, marginBottom: 4,
        }}>
          The Dice Don't Care
        </h1>
        <div style={{ color: C.muted, fontSize: S.base, fontFamily: F.display, fontStyle: "italic", marginBottom: 14 }}>
          Settlers of Catan Statistics
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
          {["DICE PROBABILITY", "GAMBLER'S FALLACY", "DEVELOPMENT CARDS"].map(tag => (
            <span key={tag} style={{
              padding: "3px 10px", borderRadius: 12,
              border: `1px solid ${C.amber}40`, color: C.amber,
              fontSize: S.xs, letterSpacing: "0.1em",
            }}>{tag}</span>
          ))}
        </div>
        <p style={{ color: C.muted, fontSize: S.base, lineHeight: 1.7, maxWidth: 700, fontFamily: F.serif }}>
          Every dice roll and card draw has an exact probability. Here's the math.
        </p>
      </div>

      <div style={{ padding: "clamp(16px, 4vw, 32px)", maxWidth: "min(90vw, 65ch)", margin: "0 auto" }}>

        {/* ══ Section 2: Theoretical Bell Curve ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500, marginBottom: 4 }}>
            Two-Dice Distribution
          </div>
          <div style={{ fontSize: S.sm, color: C.muted, marginBottom: 16 }}>
            P(sum) for 2d6 &mdash; <InfoTip term="combinations">36 outcomes</InfoTip>
          </div>

          <ResponsiveContainer width="100%" height={280}>
            <ComposedChart data={theoData} margin={{ left: 0, right: 16, top: 8, bottom: 4 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis dataKey="sum" tick={{ fill: C.muted, fontSize: S.base, fontFamily: "monospace" }} />
              <YAxis tickFormatter={v => `${v.toFixed(0)}%`} tick={{ fill: C.muted, fontSize: S.sm, fontFamily: "monospace" }} domain={[0, 20]} />
              <Tooltip content={<HistTooltip />} />
              <Bar dataKey="prob" radius={[3, 3, 0, 0]} name="Probability">
                {theoData.map((d, i) => <Cell key={i} fill={`${sumColor(d.sum)}90`} stroke={sumColor(d.sum)} />)}
              </Bar>
              <Line type="monotone" dataKey="prob" stroke={C.amber} dot={false} strokeWidth={2} strokeDasharray="6 3" />
            </ComposedChart>
          </ResponsiveContainer>

          {/* Fraction labels */}
          <div style={{ display: "flex", justifyContent: "space-around", margin: "8px 0 16px", padding: "0 30px" }}>
            {theoData.map(d => (
              <div key={d.sum} style={{ textAlign: "center", fontSize: S.xs, fontFamily: "monospace" }}>
                <div style={{ color: sumColor(d.sum) }}>{d.frac}</div>
                <div style={{ color: C.muted }}>{d.prob.toFixed(1)}%</div>
              </div>
            ))}
          </div>

          {/* Sample space grid */}
          <DiceGrid />

          {/* Key stat callout */}
          <div style={{
            marginTop: 16, padding: "12px 16px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.7,
          }}>
            7 is <span style={{ color: C.amber, fontFamily: F.mono, fontWeight: 700 }}>6x more likely</span> than 2 or 12.
            Every roll: <InfoTip term="robber"><span style={{ color: C.red, fontFamily: F.mono }}>1-in-6 chance of robber</span></InfoTip>.
          </div>
        </div>

        {/* ══ Section 3: 70-Roll Simulation ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500 }}>70-Roll Simulation</div>
              <div style={{ fontSize: S.sm, color: C.muted }}>One typical game (~70 rolls)</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {rolls.length > 0 && (
                <span style={{ fontSize: S.base, color: C.muted, fontFamily: "monospace" }}>
                  Roll {rolls.length} of 70
                </span>
              )}
              <button
                onClick={runSim} disabled={rolling}
                style={{
                  padding: "10px 18px", background: "transparent",
                  border: `1px solid ${C.amber}`, color: C.amber,
                  fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
                  opacity: rolling ? 0.5 : 1,
                }}
              >
                {rolling ? "ROLLING..." : rolls.length > 0 ? "RE-RUN" : "RUN SIMULATION"}
              </button>
            </div>
          </div>

          {rolls.length > 0 && (
            <>
              <ResponsiveContainer width="100%" height={240}>
                <ComposedChart data={rollData} margin={{ left: 0, right: 16, top: 8, bottom: 4 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                  <XAxis dataKey="sum" tick={{ fill: C.muted, fontSize: S.base, fontFamily: "monospace" }} />
                  <YAxis tickFormatter={v => `${(v * 100).toFixed(0)}%`} tick={{ fill: C.muted, fontSize: S.sm, fontFamily: "monospace" }} domain={[0, 'auto']} />
                  <Tooltip content={<HistTooltip />} />
                  <Bar dataKey="obsFrac" radius={[3, 3, 0, 0]} name="Observed" fill={`${C.blue}70`} />
                  <Line type="monotone" dataKey="theoretical" stroke={C.amber} dot={false} strokeWidth={2} strokeDasharray="6 3" name="Theory" />
                </ComposedChart>
              </ResponsiveContainer>

              {/* Residuals */}
              {!rolling && (
                <div style={{ marginTop: 12, display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 6 }}>
                  {rollData.map(d => {
                    const expected = (THEORETICAL[d.sum] * 70).toFixed(1);
                    const diff = d.observed - parseFloat(expected);
                    const diffStr = diff >= 0 ? `+${diff.toFixed(1)}` : diff.toFixed(1);
                    return (
                      <div key={d.sum} style={{
                        padding: "6px 10px", borderRadius: 3,
                        background: `${sumColor(d.sum)}08`, border: `1px solid ${sumColor(d.sum)}20`,
                        fontSize: S.sm, fontFamily: F.mono,
                      }}>
                        <span style={{ color: sumColor(d.sum) }}>{d.sum}:</span>
                        <span style={{ color: C.text }}> {d.observed}</span>
                        <span style={{ color: C.muted }}> (exp {expected})</span>
                        <span style={{ color: diff > 0 ? C.green : diff < 0 ? C.red : C.muted }}> {diffStr}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          <div style={{
            marginTop: 14, fontFamily: F.serif,
            fontSize: S.base, color: C.muted, lineHeight: 1.7, fontStyle: "italic",
          }}>
            70 rolls is a small sample. Shape is recognizable but noisy. Some sums may not appear; others may double expected count. Normal.
          </div>
        </div>

        {/* ══ Section 4: Convergence ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500, marginBottom: 4 }}>
            Convergence
          </div>
          <div style={{ fontSize: S.sm, color: C.muted, marginBottom: 16 }}>
            How many rolls until theory matches observation?
          </div>

          {/* N selector */}
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            {[70, 360, 1000, 5000, 36000].map(n => (
              <button key={n} onClick={() => setConvN(n)} style={{
                padding: "6px 14px", borderRadius: 3,
                background: convN === n ? `${C.amber}20` : "transparent",
                border: `1px solid ${convN === n ? C.amber : C.border}`,
                color: convN === n ? C.amber : C.muted,
                fontSize: S.base, fontFamily: F.mono,
              }}>
                {n.toLocaleString()}
              </button>
            ))}
          </div>

          {convData.length > 0 && (
            <ResponsiveContainer width="100%" height={240}>
              <ComposedChart data={convData} margin={{ left: 0, right: 16, top: 8, bottom: 4 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
                <XAxis dataKey="sum" tick={{ fill: C.muted, fontSize: S.base, fontFamily: "monospace" }} />
                <YAxis tickFormatter={v => `${v.toFixed(0)}%`} tick={{ fill: C.muted, fontSize: S.sm, fontFamily: "monospace" }} domain={[0, 'auto']} />
                <Tooltip content={<HistTooltip />} />
                <Bar dataKey="observed" radius={[3, 3, 0, 0]} name="Observed" fill={`${C.blue}70`} />
                <Line type="monotone" dataKey="theoretical" stroke={C.amber} dot={false} strokeWidth={2} strokeDasharray="6 3" />
              </ComposedChart>
            </ResponsiveContainer>
          )}

          {/* Chi-squared */}
          <div style={{
            marginTop: 12, display: "flex", gap: 16, alignItems: "baseline", flexWrap: "wrap",
          }}>
            <div style={{
              padding: "8px 14px", borderRadius: 4, background: C.subtle,
              fontFamily: F.mono, fontSize: S.base,
            }}>
              <InfoTip term="chi2"><span style={{ color: C.muted }}>chi-squared</span></InfoTip>
              <span style={{ color: convChi2 < 18.3 ? C.green : C.red, fontWeight: 700, marginLeft: 8 }}>
                {convChi2.toFixed(2)}
              </span>
              <span style={{ color: C.muted, marginLeft: 8, fontSize: 10 }}>
                {convChi2 < 18.3 ? "no significant deviation" : "significant deviation from theory"}
              </span>
            </div>
            <div style={{ fontSize: S.sm, color: C.muted, fontFamily: "monospace" }}>
              n = {convN.toLocaleString()} rolls
            </div>
          </div>

          <div style={{
            marginTop: 12, fontFamily: F.serif,
            fontSize: S.base, color: C.muted, lineHeight: 1.7, fontStyle: "italic",
          }}>
            {convText}
          </div>

          {/* Callout */}
          <div style={{
            marginTop: 14, padding: "12px 16px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.7,
          }}>
            <span style={{ color: C.amber, fontWeight: 700, fontFamily: F.mono }}>Clean bell curve: ~360 rolls</span> (~5 games).
          </div>
        </div>

        {/* ══ Section 5: Gambler's Fallacy ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500, marginBottom: 4 }}>
            The <InfoTip term="gambler">Gambler's Fallacy</InfoTip>
          </div>
          <div style={{ fontSize: S.sm, color: C.muted, marginBottom: 16 }}>
            Streaks don't change the next roll
          </div>

          {/* Streak display */}
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 12, minHeight: 32 }}>
            {streak.map((r, i) => (
              <div key={i} style={{
                width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center",
                background: r === 7 ? `${C.amber}30` : C.subtle,
                border: `1px solid ${r === 7 ? C.amber : C.border}`,
                borderRadius: 3, fontSize: S.base, fontFamily: F.mono,
                color: r === 7 ? C.amber : C.text,
              }}>
                {r}
              </div>
            ))}
            {streak.length === 0 && (
              <div style={{ fontSize: S.sm, color: C.muted, fontStyle: "italic", paddingTop: 6 }}>
                No rolls yet.
              </div>
            )}
          </div>

          {/* Buttons */}
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <button onClick={addRoll} style={{
              padding: "10px 18px", background: "transparent",
              border: `1px solid ${C.green}`, color: C.green,
              fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
            }}>ADD ROLL</button>
            <button onClick={addNon7} style={{
              padding: "10px 18px", background: "transparent",
              border: `1px solid ${C.red}`, color: C.red,
              fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
            }}>STREAK: NO 7</button>
            <button onClick={() => setStreak([])} style={{
              padding: "10px 18px", background: "transparent",
              border: `1px solid ${C.border}`, color: C.muted,
              fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
            }}>RESET</button>
          </div>

          {/* Non-7 streak counter */}
          {streak.length > 0 && (() => {
            let non7 = 0;
            for (let i = streak.length - 1; i >= 0; i--) {
              if (streak[i] === 7) break;
              non7++;
            }
            return non7 > 0 ? (
              <div style={{ fontSize: S.sm, color: C.red, marginBottom: 12, fontFamily: "monospace" }}>
                Current streak without a 7: {non7} roll{non7 > 1 ? "s" : ""}
              </div>
            ) : null;
          })()}

          {/* Probability readout — never changes */}
          <div style={{
            padding: "16px 20px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            textAlign: "center", marginBottom: 16,
          }}>
            <div style={{ fontSize: S.sm, color: C.muted, letterSpacing: "0.1em", marginBottom: 6 }}>
              P(NEXT ROLL = 7)
            </div>
            <div style={{ fontSize: 36, fontWeight: 700, color: C.amber, fontFamily: "monospace" }}>
              16.67%
            </div>
            <div style={{ fontSize: S.base, color: C.red, marginTop: 8, fontFamily: F.serif }}>
              After any number of non-7 rolls, P(7) stays 16.67%.
            </div>
          </div>

          {/* Two-column comparison */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            <div style={{
              background: `${C.red}08`, border: `1px solid ${C.red}25`,
              borderRadius: 4, padding: "14px 16px",
            }}>
              <div style={{ fontSize: S.sm, color: C.red, letterSpacing: "0.1em", marginBottom: 8 }}>INTUITION</div>
              <div style={{ fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.6, marginBottom: 8 }}>
                "It's due for a 7"
              </div>
              <div style={{ fontFamily: F.mono, fontSize: S.lg, color: C.red, fontWeight: 700 }}>
                Implied P ~ 40% (wrong)
              </div>
            </div>
            <div style={{
              background: `${C.green}08`, border: `1px solid ${C.green}25`,
              borderRadius: 4, padding: "14px 16px",
            }}>
              <div style={{ fontSize: S.sm, color: C.green, letterSpacing: "0.1em", marginBottom: 8 }}>REALITY</div>
              <div style={{ fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.6, marginBottom: 8 }}>
                <InfoTip term="independent">Independent trials</InfoTip> &mdash; no memory
              </div>
              <div style={{ fontFamily: F.mono, fontSize: S.lg, color: C.green, fontWeight: 700 }}>
                P = 16.67%, always
              </div>
            </div>
          </div>
        </div>

        {/* ══ Section 6: Development Cards ══ */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px", marginBottom: 24,
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: S.base, color: C.bright, fontWeight: 500 }}>Development Cards</div>
              <div style={{ fontSize: S.sm, color: C.muted }}>
                <InfoTip term="hypergeometric">Draw without replacement</InfoTip> &mdash; {deckTotal} cards
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: S.base, fontFamily: F.mono, color: C.muted }}>
                {deckTotal} / 25 remaining
              </span>
              <button onClick={resetDeck} style={{
                padding: "10px 18px", background: "transparent",
                border: `1px solid ${C.border}`, color: C.muted,
                fontSize: S.sm, letterSpacing: "0.08em", borderRadius: 2,
              }}>RESET DECK</button>
            </div>
          </div>

          {/* Stacked bar */}
          <div style={{
            display: "flex", height: 24, borderRadius: 3, overflow: "hidden",
            marginBottom: 16, marginTop: 12,
          }}>
            {Object.entries(deck).map(([type, count]) => {
              const pct = deckTotal > 0 ? (count / deckTotal * 100) : 0;
              if (pct <= 0) return null;
              return (
                <div key={type} style={{
                  width: `${pct}%`, background: `${CARD_COLORS[type]}80`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: S.xs, color: C.bright, letterSpacing: "0.05em",
                  transition: "width 0.3s",
                  overflow: "hidden", whiteSpace: "nowrap",
                }}>
                  {pct > 12 ? type : ""}
                </div>
              );
            })}
          </div>

          {/* Card panels */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 10, marginBottom: 16 }}>
            {Object.entries(deck).map(([type, count]) => {
              const pct = deckTotal > 0 ? (count / deckTotal * 100) : 0;
              const color = CARD_COLORS[type];
              const isVP = type === "Victory Point";
              return (
                <div key={type} style={{
                  background: `${color}08`, border: `1px solid ${color}25`,
                  borderRadius: 4, padding: "12px 14px",
                }}>
                  <div style={{ fontSize: S.sm, color, letterSpacing: "0.08em", marginBottom: 4 }}>
                    {isVP ? <InfoTip term="vp">{type.toUpperCase()}</InfoTip> : type.toUpperCase()}
                  </div>
                  <div style={{ fontFamily: F.mono, fontSize: S.xl, fontWeight: 700, color, marginBottom: 4 }}>
                    {pct.toFixed(1)}%
                  </div>
                  <div style={{ fontSize: S.sm, color: C.muted, fontFamily: F.mono, marginBottom: 8 }}>
                    {count} / {deckTotal} cards
                  </div>
                  <button onClick={() => drawCard(type)} disabled={count <= 0} style={{
                    padding: "8px 14px", background: "transparent",
                    border: `1px solid ${count > 0 ? color : C.border}`,
                    color: count > 0 ? color : C.muted,
                    fontSize: S.xs, letterSpacing: "0.06em", borderRadius: 2,
                    opacity: count <= 0 ? 0.4 : 1, width: "100%",
                  }}>
                    + DRAW
                  </button>
                </div>
              );
            })}
          </div>

          {/* Knight warning */}
          {knightsLeft <= 3 && knightsLeft > 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 4,
              background: `${C.red}08`, border: `1px solid ${C.red}25`,
              fontSize: S.base, color: C.red, fontFamily: F.mono,
            }}>
              <InfoTip term="largestArmy">Largest Army</InfoTip> contested &mdash; {knightsLeft} knight{knightsLeft > 1 ? "s" : ""} left
            </div>
          )}
          {knightsLeft === 0 && (
            <div style={{
              padding: "10px 14px", borderRadius: 4,
              background: `${C.red}08`, border: `1px solid ${C.red}25`,
              fontSize: S.base, color: C.red, fontFamily: F.mono,
            }}>
              All Knights drawn. <InfoTip term="largestArmy">Largest Army</InfoTip> locked.
            </div>
          )}

          {/* Insight callout */}
          <div style={{
            marginTop: 14, padding: "12px 16px", borderRadius: 4,
            background: `${C.amber}08`, border: `1px solid ${C.amber}25`,
            fontFamily: F.serif, fontSize: S.md, color: "#94a3b8", lineHeight: 1.7,
          }}>
            First draw: <span style={{ color: C.knight, fontFamily: F.mono }}>56% Knight</span>, <span style={{ color: C.monopoly, fontFamily: F.mono }}>8% Monopoly</span>.
            As Knights get played, the gap closes.
          </div>
        </div>

        {/* ══ Section 7: Proof Steps ══ */}
        <div style={{
          border: `1px solid ${C.border}`, borderRadius: 4,
          marginBottom: 24, overflow: "hidden",
        }}>
          <button
            onClick={() => setProofsOpen(o => !o)}
            style={{
              width: "100%", padding: "10px 16px", background: C.panel,
              border: "none", display: "flex", justifyContent: "space-between",
              alignItems: "center", color: C.text,
            }}
          >
            <span style={{ fontSize: S.sm, letterSpacing: "0.12em", color: C.amber }}>
              MATHEMATICAL FOUNDATION
            </span>
            <span style={{ fontSize: S.sm, color: C.muted }}>{proofsOpen ? "collapse" : "expand"}</span>
          </button>
          {proofsOpen && (
            <div style={{ padding: "16px 20px" }}>
              {[
                {
                  id: "STEP 1 — Combinatorics of Two Dice",
                  claim: "Two fair dice produce a triangular distribution on {2...12}. Combinations per sum: min(s-1, 13-s) out of 36. Pyramid: 1, 2, 3, 4, 5, 6, 5, 4, 3, 2, 1.",
                  source: "Feller, W. An Introduction to Probability Theory, Vol. I, Ch. I (1950). Wiley.",
                },
                {
                  id: "STEP 2 — Law of Large Numbers",
                  claim: "Sample mean of i.i.d. variables converges to population mean as n grows. Observed frequency approaches theoretical probability. Rate: O(1/sqrt(n)).",
                  source: "Ibid., Ch. X. The Strong Law of Large Numbers.",
                },
                {
                  id: "STEP 3 — Independence of Dice Rolls",
                  claim: "Independent iff P(A and B) = P(A) x P(B). Dice satisfy this physically. P(7 | any prior history) = P(7) = 1/6.",
                  source: "Ibid., Ch. V. Conditional Probability and Independence.",
                },
                {
                  id: "STEP 4 — Hypergeometric Distribution",
                  claim: "Drawing without replacement: hypergeometric. P(type X) = K/N where K = remaining of type X, N = total remaining. Not binomial — each draw changes deck composition.",
                  source: "Feller, W. An Introduction to Probability Theory, Vol. I, Ch. II (1950). Hypergeometric distribution.",
                },
              ].map(({ id, claim, source }) => (
                <div key={id} style={{
                  marginBottom: 16, paddingLeft: 14,
                  borderLeft: `2px solid ${C.subtle}`,
                }}>
                  <div style={{
                    fontSize: S.sm, letterSpacing: "0.1em", color: C.amber,
                    fontFamily: F.mono, marginBottom: 6,
                  }}>{id}</div>
                  <div style={{
                    fontFamily: F.serif,
                    fontSize: S.md, lineHeight: 1.75, color: "#94a3b8",
                  }}>{claim}</div>
                  <div style={{
                    fontSize: S.base, color: C.muted, marginTop: 6,
                    fontFamily: F.serif, fontStyle: "italic",
                  }}>&#8627; {source}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ══ Section 8: Citations ══ */}
        <div style={{
          paddingTop: 16, borderTop: `1px solid ${C.border}`,
          fontSize: S.sm, color: C.muted, lineHeight: 2,
        }}>
          <div style={{ letterSpacing: "0.08em", marginBottom: 4 }}>CITATIONS</div>
          <div>[1] Feller, W. (1950). <em>An Introduction to Probability Theory and Its Applications,</em> Vol. I. Wiley.</div>
          <div>[2] Kahneman, D. (2011). <em>Thinking, Fast and Slow.</em> Farrar, Straus and Giroux. Ch. 10: The Law of Small Numbers.</div>
          <div>[3] Catan GmbH. <em>CATAN Official Rulebook,</em> 5th Ed. Deck: 14 Knights, 5 VPs, 2 Road Building, 2 Year of Plenty, 2 Monopoly.</div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
