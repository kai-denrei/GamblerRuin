<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:,">
<title>Bold Play vs. Timid Play — Alternate Visualisation</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #070b14; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #070b14; }
  ::-webkit-scrollbar-thumb { background: #162035; border-radius: 2px; }
  input[type=range] { accent-color: #f59e0b; cursor: pointer; }
  button { cursor: pointer; }

<body>
<div id="root"></div>

<script>
// Web Worker for Monte Carlo — runs off main thread
const workerCode = `
self.onmessage = function(e) {
  var d = e.data;
  var B = d.B, T = d.T, p = d.p, jobs = d.jobs, jobId = d.jobId;
  var results = [];
  for (var ji = 0; ji < jobs.length; ji++) {
    var k = jobs[ji].k;
    var trials = jobs[ji].trials;
    var wins = 0;
    for (var i = 0; i < trials; i++) {
      var w = B, steps = 0;
      var maxSteps = 10000000;
      while (w > 0 && w < T && steps < maxSteps) {
        var bet = Math.min(k, w, T - w);
        if (Math.random() < p) w += bet; else w -= bet;
        steps++;
      }
      if (w >= T) wins++;
    }
    results.push({ k: k, mc: (wins / trials) * 100, trials: trials });
    self.postMessage({ type: 'progress', jobId: jobId, done: ji + 1, total: jobs.length, label: k });
  }
  self.postMessage({ type: 'result', jobId: jobId, results: results });
};
`;
const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
const workerUrl = URL.createObjectURL(workerBlob);

// Auto-scale: estimate steps per trial, cap total work at ~200M
function autoScaleTrials(B, T, k, requested) {
  const n = Math.round(B / k);
  const N = Math.round(T / k);
  const estSteps = n * (N - n);
  if (estSteps <= 0) return requested;
  const maxTrials = Math.max(200, Math.floor(200000000 / estSteps));
  return Math.min(requested, maxTrials);
}
window.__workerUrl = workerUrl;
window.__autoScaleTrials = autoScaleTrials;
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const { ComposedChart, Line, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

const C = {
  bg: "#070b14", panel: "#0c1221", border: "#162035",
  amber: "#f59e0b", green: "#10b981", red: "#ef4444",
  blue: "#60a5fa", text: "#cbd5e1", muted: "#475569",
  bright: "#f1f5f9", subtle: "#1e2d47",
};

const edgeToP = e => (1 + e) / 2;

// Continuous extension of Gambler's Ruin: no rounding, smooth curve.
// For MC validation points, use gruinDiscrete which rounds to integer steps.
function gruin(B, T, k, p) {
  const n = B / k;
  const N = T / k;
  if (n <= 0 || N <= n) return 0;
  if (Math.abs(p - 0.5) < 1e-10) return n / N;
  const r = (1 - p) / p;
  const logR = Math.log(r);
  const rn = Math.exp(logR * n);
  const rN = Math.exp(logR * N);
  if (!isFinite(rN) || rN > 1e15) return Math.max(0, Math.min(1, Math.exp(-logR * (N - n))));
  return Math.max(0, Math.min(1, (1 - rn) / (1 - rN)));
}

// Discrete version (integer steps) — used for MC comparison since MC walks integer steps
function gruinDiscrete(B, T, k, p) {
  const n = Math.round(B / k);
  const N = Math.round(T / k);
  if (n <= 0 || N <= n) return 0;
  if (Math.abs(p - 0.5) < 1e-10) return n / N;
  const r = (1 - p) / p;
  const logR = Math.log(r);
  const rn = Math.exp(logR * n);
  const rN = Math.exp(logR * N);
  if (!isFinite(rN) || rN > 1e15) return Math.max(0, Math.min(1, Math.exp(-logR * (N - n))));
  return Math.max(0, Math.min(1, (1 - rn) / (1 - rN)));
}

const fmt = n => {
  if (n >= 1e9) return `£${(n / 1e9).toFixed(1)}B`;
  if (n >= 1e6) return `£${(n / 1e6 % 1 === 0 ? (n / 1e6).toFixed(0) : (n / 1e6).toFixed(1))}M`;
  if (n >= 1e3) return `£${(n / 1e3).toFixed(0)}k`;
  return `£${n}`;
};
const pct = (v, d = 6) => v === null ? "—" : v === 0 ? "~0%" : `${(v * 100).toFixed(d)}%`;

const STEPS = [
  {
    id: "STEP 1 — Model Selection",
    claim: "A player makes fixed bets of size k in a game with win probability p per round. The session ends at ruin (bankroll = 0) or success (bankroll ≥ T). This constitutes a Markov chain on states {0, k, 2k, …, T}.",
    source: "Feller, W. An Introduction to Probability Theory, Vol. I, Ch. XIV (1950). Wiley.",
  },
  {
    id: "STEP 2 — Closed-Form Solution",
    claim: "For p ≠ 0.5, P(reach T | start B, bet k) = (1 − r^n) / (1 − r^N), where r = q/p, n = B/k, N = T/k. For a subfair game (p < 0.5), r > 1. As N grows large, P ≈ (p/q)^(N−n). Larger k reduces N−n, directly raising P.",
    source: "Ibid., Equation (14.3.2).",
  },
  {
    id: "STEP 3 — Bold Play Theorem",
    claim: "Among all admissible strategies in a subfair game, bold play — betting min(B, T−B) at each decision point — uniquely maximizes P(reach T). No timid or mixed strategy can improve upon it. The intuition: fewer rounds give the house edge fewer compounding opportunities.",
    source: "Dubins, L.E. & Savage, L.J. How to Gamble If You Must (1965). McGraw-Hill. Theorem 1.",
  },
  {
    id: "STEP 4 — Consequence for Fixed Bet Sizes",
    claim: "Within the class of fixed-bet strategies, P(reach T) is strictly increasing in k when p < 0.5. 'More attempts' is a misleading heuristic: it assumes independence, but each round is a multiplicative erosion of expected wealth in a negative-EV game.",
    source: "Ethier, S.N. & Tavaré, S. (1983). The proportional bettor's return on investment. J. Applied Probability, 20(3), 563–573.",
  },
];

// ── Descriptions for key terms (hover on desktop, tap on mobile) ─────────────
const TIPS = {
  B: "The amount of money you start with. This is your initial capital before any bets are placed.",
  T: "The goal amount you want to reach. The game ends when you hit this target or lose everything (ruin).",
  edge: "The casino's built-in advantage on every bet. A -0.50% edge means you lose £0.50 on average per £100 wagered. The more negative, the worse the odds.",
  p: "Your probability of winning any single bet. Derived from the house edge: p = (1 + edge) / 2. Below 0.5 means the game is subfair.",
  mcTrials: "Number of random simulations run per data point. More trials = more accurate Monte Carlo estimate, but takes longer.",
  boldPlay: "Betting the maximum possible (min of bankroll, target minus bankroll) each round. Dubins & Savage proved this uniquely maximizes the chance of reaching the target in a subfair game.",
  timidPlay: "Betting the minimum amount each round. Gives more rounds of play but exposes you to the house edge for longer — strictly worse for reaching a target in a subfair game.",
  closedForm: "The exact mathematical probability computed from the Gambler's Ruin formula. No simulation needed — this is the true answer.",
  monteCarlo: "An empirical estimate obtained by simulating thousands of random game sessions and counting how many reach the target.",
  subfair: "A game where the house has an advantage (win probability < 50%). Every casino game is subfair for the player.",
};

function InfoTip({ term, children }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const desc = TIPS[term];
  if (!desc) return children;

  // Close on outside click/touch
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('pointerdown', handler);
    return () => document.removeEventListener('pointerdown', handler);
  }, [open]);

  return (
    <span ref={ref} style={{ position: "relative", display: "inline" }}>
      <span
        onMouseEnter={() => setOpen(true)}
        onMouseLeave={() => setOpen(false)}
        onTouchStart={(e) => { e.preventDefault(); setOpen(o => !o); }}
        style={{
          borderBottom: `1px dotted ${C.muted}`,
          cursor: "help",
        }}
      >
        {children}
      </span>
      {open && (
        <span style={{
          position: "absolute", bottom: "calc(100% + 8px)", left: "50%",
          transform: "translateX(-50%)", width: 260, padding: "10px 12px",
          background: "#1a2540", border: `1px solid ${C.border}`,
          borderRadius: 6, fontSize: 11, lineHeight: 1.6,
          color: C.text, zIndex: 1000, pointerEvents: "auto",
          fontFamily: "'Source Serif 4', serif", fontWeight: 300,
          boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
        }}>
          {desc}
          <span style={{
            position: "absolute", bottom: -6, left: "50%", transform: "translateX(-50%)",
            width: 0, height: 0,
            borderLeft: "6px solid transparent", borderRight: "6px solid transparent",
            borderTop: `6px solid #1a2540`,
          }} />
        </span>
      )}
    </span>
  );
}

// ChartTooltip moved inside App for access to B, safeT, p

function App() {
  const [B, setB] = useState(10_000_000);
  const [T, setT] = useState(100_000_000);
  const [edge, setEdge] = useState(-0.005);
  const [mcTrials, setMcTrials] = useState(8000);
  const [mcDots, setMcDots] = useState([]);
  const [mcRunning, setMcRunning] = useState(false);
  const [mcProgress, setMcProgress] = useState('');
  const [reasonOpen, setReasonOpen] = useState(true);
  const [logY, setLogY] = useState(false);
  const [dsResult, setDsResult] = useState(null);
  const workerRef = useRef(null);

  const p = edgeToP(edge);
  const safeT = Math.max(T, B * 2);

  // Tooltip: compute CF directly from gruin() for the hovered k
  // This avoids Recharts' broken index-based data alignment
  const renderTooltip = useCallback(({ active, payload }) => {
    if (!active || !payload?.length) return null;
    // Find the k value — prefer MC scatter data (exact k), fall back to curve
    let k = null, mc = null;
    for (const entry of payload) {
      const d = entry?.payload;
      if (!d) continue;
      if (d.mc != null && d.k != null) { k = d.k; mc = d.mc; }
      if (k === null && d.k != null) k = d.k;
    }
    if (k === null) return null;
    // Always compute CF fresh from the k value
    const cf = gruin(B, safeT, k, p) * 100;
    const ruin = 100 - cf;
    return (
      <div style={{
        background: C.panel, border: `1px solid ${C.border}`,
        padding: "8px 12px", fontFamily: "monospace", fontSize: 11,
      }}>
        <div style={{ color: C.muted, marginBottom: 4 }}>Bet size</div>
        <div style={{ color: C.bright, fontWeight: "bold", marginBottom: 6 }}>{fmt(k)}</div>
        <div style={{ color: C.amber }}>Closed-form: {cf.toFixed(6)}%</div>
        {mc != null && <div style={{ color: C.green }}>Monte Carlo: {mc.toFixed(4)}%</div>}
        <div style={{ color: C.red, marginTop: 4 }}>Risk of ruin: {ruin.toFixed(2)}%</div>
      </div>
    );
  }, [B, safeT, p]);

  const curve = useMemo(() => {
    const minK = Math.max(Math.round(B / 3000), 1000);
    const maxK = B;
    return Array.from({ length: 250 }, (_, i) => {
      const t = i / 249;
      const k = Math.round(minK * Math.pow(maxK / minK, t));
      const cf = gruin(B, safeT, k, p) * 100;
      return { k, cf };
    });
  }, [B, safeT, p]);

  // DS demo — closed-form instant, MC via worker
  useEffect(() => {
    const k1 = 25_000, k2 = 100_000;
    const cf1 = gruinDiscrete(B, safeT, k1, p);
    const cf2 = gruinDiscrete(B, safeT, k2, p);
    setDsResult({ k1, k2, cf1, cf2, mc1: null, mc2: null });

    const w = new Worker(window.__workerUrl);
    const trials1 = window.__autoScaleTrials(B, safeT, k1, 3000);
    const trials2 = window.__autoScaleTrials(B, safeT, k2, 3000);
    w.postMessage({ B, T: safeT, p, jobs: [{ k: k1, trials: trials1 }, { k: k2, trials: trials2 }], jobId: 0 });
    w.onmessage = function(e) {
      if (e.data.type === 'result') {
        const r = e.data.results;
        setDsResult(prev => ({ ...prev, mc1: r[0].mc / 100, mc2: r[1].mc / 100 }));
        w.terminate();
      }
    };
    return () => w.terminate();
  }, [B, safeT, p]);

  // MC run via Web Worker
  const handleMC = useCallback(() => {
    if (workerRef.current) workerRef.current.terminate();
    setMcRunning(true);
    setMcDots([]);
    setMcProgress('Starting...');

    const divisors = [2000, 500, 150, 40, 12, 4, 1];
    const keyBets = divisors
      .map(d => Math.round(B / d))
      .filter(k => k >= 1000 && k <= B);

    const jobs = keyBets.map(k => ({
      k,
      trials: window.__autoScaleTrials(B, safeT, k, mcTrials),
    }));

    const w = new Worker(window.__workerUrl);
    workerRef.current = w;
    w.postMessage({ B, T: safeT, p, jobs, jobId: 1 });
    w.onmessage = function(e) {
      const msg = e.data;
      if (msg.type === 'progress') {
        setMcProgress(`${msg.done}/${msg.total} bet sizes (${fmt(msg.label)})...`);
      }
      if (msg.type === 'result') {
        setMcDots(msg.results);
        setMcRunning(false);
        setMcProgress('');
        workerRef.current = null;
        w.terminate();
      }
    };
    w.onerror = function() {
      setMcRunning(false);
      setMcProgress('Error');
      workerRef.current = null;
    };
  }, [B, safeT, p, mcTrials]);

  const cancelMC = useCallback(() => {
    if (workerRef.current) {
      workerRef.current.terminate();
      workerRef.current = null;
    }
    setMcRunning(false);
    setMcProgress('Cancelled.');
  }, []);

  const sanityRows = mcDots.map(({ k, mc: mcV, trials }) => {
    const cfV = gruinDiscrete(B, safeT, k, p);
    const delta = Math.abs(mcV / 100 - cfV);
    const pass = delta < Math.max(cfV * 0.15, 0.0005);
    return { k, cfV, mcV, delta, pass, trials };
  });

  // Bold play: bet everything (k = B), compute P(reach T) and ruin
  const boldP = gruin(B, safeT, B, p);
  const ruinP = 1 - boldP;

  const dsMultiplier = dsResult && dsResult.cf1 > 1e-20 && dsResult.cf2 > 1e-20
    ? (dsResult.cf2 / dsResult.cf1).toLocaleString(undefined, { maximumSignificantDigits: 3 })
    : null;

  return (
    <div style={{
      background: C.bg, minHeight: "100vh", color: C.text,
      fontFamily: "'JetBrains Mono', monospace",
    }}>
      {/* Header */}
      <div style={{ borderBottom: `1px solid ${C.border}`, padding: "20px 32px 16px" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 16, flexWrap: "wrap" }}>
          <h1 style={{
            fontFamily: "'Playfair Display', serif",
            fontSize: 20, fontWeight: 700, color: C.bright,
          }}>
            Bold Play vs. Timid Play in Negative-EV Games
          </h1>
          <span style={{ color: C.muted, fontSize: 10, letterSpacing: "0.06em" }}>
            DUBINS & SAVAGE · 1965
          </span>
        </div>
        <p style={{ color: C.muted, fontSize: 11, marginTop: 6, lineHeight: 1.6, maxWidth: 640 }}>
          In a <InfoTip term="subfair">subfair game</InfoTip>, P(reach target T) is strictly increasing in bet size.
          Larger bets are not riskier relative to goal — they are optimal.
          This simulation proves the claim via closed-form and Monte Carlo.
        </p>
      </div>

      <div style={{ padding: "24px 32px", maxWidth: 1000, margin: "0 auto" }}>

        {/* Parameters */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
          {/* Bankroll */}
          <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 4, padding: "12px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.06em" }}>
                <InfoTip term="B">Starting Bankroll (B)</InfoTip>
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.amber, fontFamily: "monospace" }}>{fmt(B)}</div>
            </div>
            <input type="range" min={1e6} max={50e6} step={1e6} value={B}
              onChange={e => setB(Number(e.target.value))} style={{ width: "100%" }} />
          </div>
          {/* Target */}
          <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 4, padding: "12px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.06em" }}>
                <InfoTip term="T">Target (T)</InfoTip>
                <span style={{ marginLeft: 6, color: C.muted, fontSize: 10 }}>({(safeT / B).toFixed(0)}x bankroll)</span>
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.amber, fontFamily: "monospace" }}>{fmt(safeT)}</div>
            </div>
            <input type="range" min={10e6} max={500e6} step={10e6} value={T}
              onChange={e => setT(Math.max(Number(e.target.value), B * 2))} style={{ width: "100%" }} />
          </div>
          {/* Edge */}
          <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 4, padding: "12px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.06em" }}>
                <InfoTip term="edge">House Edge</InfoTip>
                {" · "}
                <InfoTip term="p">p</InfoTip> = {edgeToP(edge).toFixed(4)}
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.amber, fontFamily: "monospace" }}>{(edge * 100).toFixed(2)}%</div>
            </div>
            <input type="range" min={-0.05} max={-0.001} step={0.001} value={edge}
              onChange={e => setEdge(Number(e.target.value))} style={{ width: "100%" }} />
          </div>
          {/* MC Trials */}
          <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 4, padding: "12px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.06em" }}>
                <InfoTip term="mcTrials">Monte Carlo Trials</InfoTip> per point
              </div>
              <div style={{ fontSize: 14, fontWeight: 700, color: C.amber, fontFamily: "monospace" }}>{mcTrials.toLocaleString()}</div>
            </div>
            <input type="range" min={1000} max={20000} step={1000} value={mcTrials}
              onChange={e => setMcTrials(Number(e.target.value))} style={{ width: "100%" }} />
          </div>
        </div>

        {/* Main Chart */}
        <div style={{
          background: C.panel, border: `1px solid ${C.border}`,
          borderRadius: 4, padding: "20px 16px 16px", marginBottom: 24,
        }}>
          <div style={{
            display: "flex", justifyContent: "space-between",
            alignItems: "flex-start", marginBottom: 16, padding: "0 8px",
            flexWrap: "wrap", gap: 12,
          }}>
            <div>
              <div style={{ fontSize: 12, color: C.bright, fontWeight: 500 }}>
                P(reach {fmt(safeT)}) vs. Bet Size
              </div>
              <div style={{ fontSize: 10, color: C.muted, marginTop: 3 }}>
                B = {fmt(B)} · edge = {(edge * 100).toFixed(2)}% · bold play = {fmt(B)}
              </div>
              <div style={{
                marginTop: 8, padding: "8px 12px", borderRadius: 4,
                background: `${C.red}12`, border: `1px solid ${C.red}30`,
                display: "flex", gap: 16, alignItems: "baseline", flexWrap: "wrap",
              }}>
                <div style={{ fontSize: 10, color: C.red, letterSpacing: "0.08em" }}>
                  BEST CASE (BOLD PLAY)
                </div>
                <div style={{ fontFamily: "monospace" }}>
                  <span style={{ color: C.green, fontSize: 13 }}>P(target) = {(boldP * 100).toFixed(2)}%</span>
                  <span style={{ color: C.muted, margin: "0 8px" }}>|</span>
                  <span style={{ color: C.red, fontSize: 15, fontWeight: 700 }}>P(ruin) = {(ruinP * 100).toFixed(2)}%</span>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <button
                onClick={() => setLogY(v => !v)}
                style={{
                  padding: "5px 12px", background: "transparent",
                  border: `1px solid ${C.muted}`, color: C.muted,
                  fontSize: 10, letterSpacing: "0.06em", borderRadius: 2,
                }}
              >
                Y: {logY ? "LOG" : "LINEAR"}
              </button>
              {mcRunning ? (
                <button
                  onClick={cancelMC}
                  style={{
                    padding: "5px 14px", background: "transparent",
                    border: `1px solid ${C.red}`, color: C.red,
                    fontSize: 10, letterSpacing: "0.08em", borderRadius: 2,
                  }}
                >
                  CANCEL
                </button>
              ) : (
                <button
                  onClick={handleMC}
                  style={{
                    padding: "5px 14px", background: "transparent",
                    border: `1px solid ${C.green}`, color: C.green,
                    fontSize: 10, letterSpacing: "0.08em", borderRadius: 2,
                  }}
                >
                  RUN MONTE CARLO
                </button>
              )}
            </div>
          </div>

          {/* Legend */}
          <div style={{ display: "flex", gap: 20, marginBottom: 12, paddingLeft: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: C.muted }}>
              <div style={{ width: 24, height: 2, background: C.amber }} /> <InfoTip term="closedForm">Closed-form exact</InfoTip>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: C.muted }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.green }} />
              <InfoTip term="monteCarlo">Monte Carlo</InfoTip> (auto-scaled trials/pt)
            </div>
          </div>

          <ResponsiveContainer width="100%" height={340}>
            <ComposedChart data={curve} margin={{ left: 10, right: 24, top: 8, bottom: 40 }}>
              <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
              <XAxis
                dataKey="k" scale="log" domain={["auto", "auto"]} type="number"
                tickFormatter={v => fmt(v)}
                tick={{ fill: C.muted, fontSize: 10, fontFamily: "monospace" }}
                label={{ value: "Bet Size  (log scale)", position: "insideBottom", offset: -28, fill: C.muted, fontSize: 10, fontFamily: "monospace" }}
              />
              <YAxis
                scale={logY ? "log" : "linear"}
                domain={logY ? ["auto", "auto"] : [0, "auto"]}
                allowDataOverflow
                tickFormatter={v => `${v.toFixed(logY ? 4 : 2)}%`}
                tick={{ fill: C.muted, fontSize: 10, fontFamily: "monospace" }}
                label={{ value: "P(reach target)", angle: -90, position: "insideLeft", offset: 12, fill: C.muted, fontSize: 10, fontFamily: "monospace" }}
              />
              <Tooltip content={renderTooltip} />
              <Line type="monotone" dataKey="cf" stroke={C.amber} dot={false} strokeWidth={2} name="Closed-form" />
              {mcDots.length > 0 && (
                <Scatter data={mcDots} dataKey="mc" fill={C.green} name="Monte Carlo" />
              )}
            </ComposedChart>
          </ResponsiveContainer>

          <div style={{ textAlign: "center", fontSize: 10, color: C.muted, marginTop: 8, letterSpacing: "0.08em" }}>
            {mcRunning ? mcProgress : mcDots.length === 0
              ? 'Closed-form curve loaded. Press "RUN MONTE CARLO" to overlay verification dots.'
              : `${mcDots.length} Monte Carlo points overlaid.`}
          </div>
        </div>

        {/* Reasoning Block */}
        <div style={{
          border: `1px solid ${C.border}`, borderRadius: 4,
          marginBottom: 24, overflow: "hidden",
        }}>
          <button
            onClick={() => setReasonOpen(r => !r)}
            style={{
              width: "100%", padding: "10px 16px", background: C.panel,
              border: "none", display: "flex", justifyContent: "space-between",
              alignItems: "center", color: C.text,
            }}
          >
            <span style={{ fontSize: 10, letterSpacing: "0.12em", color: C.amber }}>
              REASONING BLOCK — Mathematical Foundation (sources cited before computation)
            </span>
            <span style={{ fontSize: 10, color: C.muted }}>{reasonOpen ? "collapse" : "expand"}</span>
          </button>
          {reasonOpen && (
            <div style={{ padding: "16px 20px" }}>
              {STEPS.map(({ id, claim, source }) => (
                <div key={id} style={{
                  marginBottom: 16, paddingLeft: 14,
                  borderLeft: `2px solid ${C.subtle}`,
                }}>
                  <div style={{
                    fontSize: 10, letterSpacing: "0.1em", color: C.amber,
                    fontFamily: "monospace", marginBottom: 6,
                  }}>{id}</div>
                  <div style={{
                    fontFamily: "'Source Serif 4', serif",
                    fontSize: 13, lineHeight: 1.75, color: "#94a3b8",
                  }}>{claim}</div>
                  <div style={{
                    fontSize: 11, color: C.muted, marginTop: 6,
                    fontFamily: "'Source Serif 4', serif", fontStyle: "italic",
                  }}>&#8627; {source}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Dubins-Savage Demonstration */}
        <div style={{
          border: `1px solid ${C.amber}30`, borderRadius: 4,
          padding: "18px 20px", marginBottom: 24, background: `${C.amber}06`,
        }}>
          <div style={{ fontSize: 10, color: C.amber, letterSpacing: "0.14em", marginBottom: 12 }}>
            THE DUBINS-SAVAGE DEMONSTRATION
          </div>
          <div style={{
            fontFamily: "'Source Serif 4', serif",
            color: "#94a3b8", fontSize: 14, marginBottom: 4, lineHeight: 1.6,
          }}>
            "Would you rather have 400 attempts at £25k, or 100 attempts at £100k?"
          </div>
          <div style={{
            fontFamily: "'Source Serif 4', serif",
            color: C.muted, fontSize: 12, marginBottom: 20,
          }}>
            Both start at {fmt(B)}, target {fmt(safeT)}, edge {(edge * 100).toFixed(2)}%.
            Intuition says more attempts = better. The math disagrees.
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            {dsResult && [
              { label: "TIMID PLAY", tip: "timidPlay", sublabel: "£25k / bet", cf: dsResult.cf1, mc: dsResult.mc1, color: C.red, verdict: "Compounding erosion. House edge grinds you down." },
              { label: "BOLD PLAY", tip: "boldPlay", sublabel: "£100k / bet", cf: dsResult.cf2, mc: dsResult.mc2, color: C.green, verdict: "Fewer rounds. House gets less time to work against you." },
            ].map(({ label, tip, sublabel, cf, mc: mcV, color, verdict }) => (
              <div key={label} style={{
                background: C.panel, border: `1px solid ${color}30`,
                borderRadius: 4, padding: "14px 16px",
              }}>
                <div style={{ fontSize: 10, color, letterSpacing: "0.1em", marginBottom: 4 }}><InfoTip term={tip}>{label}</InfoTip></div>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 14 }}>{sublabel}</div>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>Closed-form P(reach T)</div>
                <div style={{ fontSize: 20, fontWeight: 700, color, marginBottom: 10, fontFamily: "monospace" }}>
                  {pct(cf, cf < 1e-10 ? 15 : 8)}
                </div>
                <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>Monte Carlo P</div>
                <div style={{ fontSize: 14, color: mcV !== null ? color : C.muted, fontFamily: "monospace" }}>
                  {mcV !== null ? pct(mcV, 4) : "computing..."}
                </div>
                <div style={{
                  marginTop: 12, fontSize: 11, color: C.muted,
                  fontFamily: "'Source Serif 4', serif", lineHeight: 1.5,
                }}>
                  {verdict}
                </div>
              </div>
            ))}
          </div>

          <div style={{
            padding: "12px 16px", background: C.panel, borderRadius: 4,
            fontFamily: "'Source Serif 4', serif", fontSize: 13, color: "#94a3b8", lineHeight: 1.7,
          }}>
            {dsResult && dsMultiplier ? (
              <>
                Bold play is <span style={{ color: C.amber, fontFamily: "monospace", fontSize: 14 }}>
                  {dsMultiplier}x
                </span> more likely to reach the target — despite making{" "}
                <span style={{ color: C.red }}>75% fewer bets</span>.
                {" "}Every additional round in a negative-EV game is a compounding disadvantage.
                Dubins & Savage (1965) proved this is the global optimum — no strategy can do better.
              </>
            ) : dsResult ? (
              "The P(reach T) for £25k is so small it underflows standard floating-point. " +
              "This itself is the demonstration: timid play is not merely worse — it is catastrophically worse."
            ) : "Computing..."}
          </div>
        </div>

        {/* Sanity Check */}
        {sanityRows.length > 0 && (
          <div style={{
            background: C.panel, border: `1px solid ${C.border}`,
            borderRadius: 4, overflow: "hidden", marginBottom: 24,
          }}>
            <div style={{
              padding: "10px 16px", borderBottom: `1px solid ${C.border}`,
              fontSize: 10, color: C.muted, letterSpacing: "0.08em",
              display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <span>SANITY CHECK — Closed-form vs Monte Carlo</span>
              <span>{sanityRows.filter(r => r.pass).length}/{sanityRows.length} PASS</span>
            </div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr>
                    {["Bet Size", "Closed-form P", "MC P", "Trials", "Delta (pp)", "Flag"].map(h => (
                      <th key={h} style={{
                        padding: "8px 16px", textAlign: "left",
                        color: C.muted, fontWeight: 400,
                        borderBottom: `1px solid ${C.border}`, whiteSpace: "nowrap",
                      }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sanityRows.map(({ k, cfV, mcV, delta, pass, trials }) => (
                    <tr key={k} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td style={{ padding: "8px 16px", color: C.bright, whiteSpace: "nowrap" }}>{fmt(k)}</td>
                      <td style={{ padding: "8px 16px", color: C.amber, fontFamily: "monospace" }}>{(cfV * 100).toFixed(6)}%</td>
                      <td style={{ padding: "8px 16px", color: C.green, fontFamily: "monospace" }}>{mcV.toFixed(4)}%</td>
                      <td style={{ padding: "8px 16px", color: C.muted, fontFamily: "monospace" }}>{trials.toLocaleString()}</td>
                      <td style={{ padding: "8px 16px", color: C.muted, fontFamily: "monospace" }}>{(delta * 100).toFixed(5)}</td>
                      <td style={{ padding: "8px 16px" }}>
                        <span style={{ color: pass ? C.green : C.red, fontSize: 10, letterSpacing: "0.06em" }}>
                          {pass ? "PASS" : "FLAG >1%"}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{
              padding: "8px 16px", fontSize: 10, color: C.muted,
              borderTop: `1px solid ${C.border}`,
            }}>
              Trials auto-scaled per bet size to prevent browser freeze. Small bets = fewer trials.
            </div>
          </div>
        )}

        {/* Citations */}
        <div style={{
          paddingTop: 16, borderTop: `1px solid ${C.border}`,
          fontSize: 10, color: C.muted, lineHeight: 2,
        }}>
          <div style={{ letterSpacing: "0.08em", marginBottom: 4 }}>CITATIONS</div>
          <div>[1] Dubins, L.E. & Savage, L.J. (1965). <em>How to Gamble If You Must: Inequalities for Stochastic Processes.</em> McGraw-Hill.</div>
          <div>[2] Feller, W. (1950). <em>An Introduction to Probability Theory and Its Applications,</em> Vol. I, Ch. XIV. Wiley.</div>
          <div>[3] Ethier, S.N. & Tavare, S. (1983). The proportional bettor's return on investment. <em>Journal of Applied Probability,</em> 20(3), 563-573.</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
